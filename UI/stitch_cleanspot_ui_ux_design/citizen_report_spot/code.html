<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>CleanSpot - Report New Spot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#283044",
                        "on-surface-variant": "#c2c6d6",
                        "primary-container": "#4d8eff",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-container": "#171f33",
                        "on-background": "#dae2fd",
                        "on-error-container": "#ffdad6",
                        "surface": "#0b1326",
                        "primary-fixed-dim": "#adc6ff",
                        "tertiary-fixed-dim": "#d0bcff",
                        "primary": "#adc6ff",
                        "on-error": "#690005",
                        "surface-dim": "#0b1326",
                        "inverse-primary": "#005ac2",
                        "on-tertiary-fixed": "#23005c",
                        "secondary": "#4edea3",
                        "on-tertiary-fixed-variant": "#5516be",
                        "on-primary": "#002e6a",
                        "on-secondary": "#003824",
                        "on-secondary-container": "#00311f",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-fixed": "#001a42",
                        "on-surface": "#dae2fd",
                        "on-tertiary-container": "#340080",
                        "on-primary-fixed-variant": "#004395",
                        "surface-tint": "#adc6ff",
                        "secondary-fixed": "#6ffbbe",
                        "secondary-container": "#00a572",
                        "tertiary-fixed": "#e9ddff",
                        "tertiary": "#d0bcff",
                        "surface-container-highest": "#2d3449",
                        "inverse-surface": "#dae2fd",
                        "surface-bright": "#31394d",
                        "surface-container-lowest": "#060e20",
                        "tertiary-container": "#a078ff",
                        "error": "#ffb4ab",
                        "on-primary-container": "#00285d",
                        "outline-variant": "#424754",
                        "on-secondary-fixed": "#002113",
                        "surface-container-high": "#222a3d",
                        "surface-container-low": "#131b2e",
                        "on-tertiary": "#3c0091",
                        "primary-fixed": "#d8e2ff",
                        "outline": "#8c909f",
                        "surface-variant": "#2d3449",
                        "error-container": "#93000a",
                        "background": "#0b1326"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b1326;
            overflow: hidden;
        }
        .bottom-sheet {
            height: 75vh;
            transform: translateY(15vh);
        }
        .glass-panel {
            background: rgba(19, 27, 46, 0.8);
            backdrop-filter: blur(24px);
        }
        .map-gradient-overlay {
            background: linear-gradient(to bottom, rgba(11, 19, 38, 0.4) 0%, transparent 20%, transparent 80%, rgba(11, 19, 38, 0.9) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface">
<!-- Top AppBar -->
<header class="fixed top-0 z-50 flex justify-between items-center w-full px-6 py-4 bg-[#0b1326] dark:bg-[#0b1326]">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full overflow-hidden border border-primary/20">
<img alt="user profile picture" class="w-full h-full object-cover" data-alt="close-up portrait of a professional urban planner in soft natural lighting, high-end editorial style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjR_aPy3vdo1pzXGvEA2NTm88IZtRcLOV5bJFK9ww5Pk3t7hijotSMlZ7UvgxQtUnjlyQvINOw9geYDi7trItSem1A4ezpI2NvLHlEHyRx4YpCzC1DdhGB2vuFqB8fo5BfIILpC6-Id2pAltt-MZ7wTnjK8-Yv6UmBB0aqN42nDPq5u2o2WtKcVFbchcCUYGxKqhmNQpf_cnQYz281-spTRn1dKbUhrI9qMNucx610XFrbtMqh3JAermqgX7--qCuN5nSZ-JOqAOQk"/>
</div>
<h1 class="text-xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-[#adc6ff] to-[#4d8eff] font-['Inter']">CleanSpot</h1>
</div>
<button class="text-[#adc6ff] hover:opacity-80 transition-opacity active:scale-95 duration-150">
<span class="material-symbols-outlined" data-icon="dark_mode">dark_mode</span>
</button>
</header>
<!-- Map Canvas (Full Screen) -->
<main class="relative h-screen w-full overflow-hidden bg-surface-container-lowest">
<!-- Mock Map Background -->
<div class="absolute inset-0 z-0">
<img class="w-full h-full object-cover opacity-60" data-alt="detailed dark mode topographic satellite map of a modern city grid with glowing blue transit lines and subtle depth" data-location="San Francisco" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtysqkF6WCjDk7_Bd9ZgJ3cMBSlDCglp4U0hmq7qpUU6VQUuSEZpguwUnSGwhVSaGZmRbdoqlzrOsRxwGCFaZ2hZImd1yDiFZWkzv9Izs3qhJ5BLWSroscmSKKhceee1JUVbR0VBmBKUiFO42JXwRcTwpEPj3ACnNO7HmXGRQAz1DmQQ-aI-sSwjwE8cDwfmpYJM2Oy7sQWLt6vR2LVBp-67fUYAFIUBae-cyxTCgkbzaL3SLAFYpNSYJp9nMHYb-uVkZcZ8p9n_Eo"/>
<div class="absolute inset-0 map-gradient-overlay pointer-events-none"></div>
</div>
<!-- Central Pin -->
<div class="absolute inset-0 flex items-center justify-center z-10 pointer-events-none">
<div class="relative flex flex-col items-center">
<div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center animate-pulse">
<div class="w-4 h-4 bg-primary rounded-full shadow-[0_0_12px_rgba(173,198,255,0.8)]"></div>
</div>
<div class="mt-2 px-3 py-1 bg-surface-container-highest rounded-lg shadow-lg border border-outline-variant/20">
<span class="text-xs font-bold text-primary tracking-widest uppercase">Target Area</span>
</div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute right-6 top-24 z-20 flex flex-col gap-4">
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low rounded-xl shadow-lg hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="my_location">my_location</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low rounded-xl shadow-lg hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="add">add</span>
</button>
<button class="w-12 h-12 flex items-center justify-center bg-surface-container-low rounded-xl shadow-lg hover:bg-surface-container transition-colors active:scale-95">
<span class="material-symbols-outlined text-on-surface" data-icon="remove">remove</span>
</button>
</div>
<!-- Bottom Sheet Interaction Area -->
<div class="absolute bottom-0 left-0 right-0 z-30 px-4 pb-24">
<div class="bottom-sheet glass-panel rounded-t-[32px] shadow-[0_-12px_40px_rgba(0,0,0,0.5)] overflow-hidden flex flex-col">
<!-- Handle -->
<div class="w-full flex justify-center py-4">
<div class="w-12 h-1.5 bg-outline-variant/40 rounded-full"></div>
</div>
<div class="px-8 pb-10 flex-1 overflow-y-auto">
<!-- Header -->
<div class="flex justify-between items-end mb-8">
<div>
<h2 class="text-2xl font-extrabold tracking-tight text-on-surface">Report New Spot</h2>
<p class="text-on-surface-variant text-sm mt-1">320 Market St, San Francisco</p>
</div>
<div class="flex flex-col items-end">
<span class="text-[10px] font-bold tracking-widest text-primary uppercase opacity-60">Status</span>
<span class="text-sm font-semibold text-secondary">ACTIVE SESSION</span>
</div>
</div>
<!-- Photo Upload Area -->
<div class="mb-8 group">
<div class="w-full h-48 bg-surface-container-lowest border-2 border-dashed border-outline-variant/30 rounded-3xl flex flex-col items-center justify-center cursor-pointer group-hover:border-primary/50 transition-all duration-300">
<div class="w-16 h-16 rounded-full bg-primary-container/10 flex items-center justify-center mb-4 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="photo_camera">photo_camera</span>
</div>
<span class="text-on-surface-variant font-medium">Upload evidence photo</span>
<span class="text-outline text-xs mt-1">Max file size 10MB</span>
</div>
</div>
<!-- Severity Selector -->
<div class="mb-8">
<label class="text-[11px] font-bold tracking-widest text-on-surface-variant uppercase mb-4 block">Select Severity</label>
<div class="grid grid-cols-3 gap-3">
<button class="bg-secondary-container/20 text-on-secondary-container border border-secondary-container/30 py-3 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-secondary-container/40 transition-colors">
                                Low
                            </button>
<button class="bg-[#ff9800]/10 text-[#ff9800] border border-[#ff9800]/30 py-3 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-[#ff9800]/20 transition-colors">
                                Medium
                            </button>
<button class="bg-error-container text-on-error-container py-3 rounded-lg text-xs font-bold uppercase tracking-wider hover:opacity-90 transition-opacity">
                                High
                            </button>
</div>
</div>
<!-- Description -->
<div class="mb-8">
<label class="text-[11px] font-bold tracking-widest text-on-surface-variant uppercase mb-4 block">Description</label>
<textarea class="w-full bg-surface-container-lowest border-none rounded-2xl p-4 text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all text-sm" placeholder="Describe the issue in detail..." rows="3"></textarea>
</div>
<!-- CTA -->
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary-container font-extrabold text-lg shadow-lg shadow-primary/20 active:scale-95 transition-all mb-4">
                        Submit Report
                    </button>
</div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 bg-[#131b2e]/60 backdrop-blur-xl dark:bg-[#131b2e]/60 flex justify-around items-center px-4 pt-3 pb-6 rounded-t-[24px] shadow-[0_-8px_32px_rgba(0,26,66,0.08)]">
<!-- Home -->
<a class="flex flex-col items-center justify-center text-[#8e9199] px-5 py-2 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Home</span>
</a>
<!-- Map / Report (Active) -->
<a class="flex flex-col items-center justify-center bg-[#2d3449] text-[#adc6ff] rounded-2xl px-5 py-2 active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="map" style="font-variation-settings: 'FILL' 1;">map</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Map</span>
</a>
<!-- Claims / My Reports -->
<a class="flex flex-col items-center justify-center text-[#8e9199] px-5 py-2 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="assignment_turned_in">assignment_turned_in</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Claims</span>
</a>
<!-- Rank -->
<a class="flex flex-col items-center justify-center text-[#8e9199] px-5 py-2 hover:text-white transition-colors active:scale-90 duration-200" href="#">
<span class="material-symbols-outlined mb-1" data-icon="leaderboard">leaderboard</span>
<span class="font-['Inter'] text-[11px] font-medium tracking-wide uppercase">Rank</span>
</a>
</nav>
</body></html>
