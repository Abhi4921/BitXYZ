<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>CleanSpot - Secure Access</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0b1326;
            font-family: 'Inter', sans-serif;
        }
        .glass-effect {
            background: rgba(45, 52, 73, 0.6);
            backdrop-filter: blur(24px);
        }
        .text-gradient-primary {
            background: linear-gradient(135deg, #adc6ff 0%, #4d8eff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex min-h-screen items-center justify-center p-6 sm:p-12 overflow-x-hidden">
<!-- Ambient Background Decorations -->
<div class="fixed top-[-10%] left-[-10%] w-[50%] h-[50%] bg-primary/10 blur-[120px] rounded-full pointer-events-none"></div>
<div class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-secondary/5 blur-[100px] rounded-full pointer-events-none"></div>
<main class="w-full max-w-xl flex flex-col gap-10 relative z-10">
<!-- Header / Identity -->
<header class="flex flex-col items-center text-center gap-3">
<div class="p-4 bg-surface-container-high rounded-3xl mb-4">
<span class="material-symbols-outlined text-4xl text-primary" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
<h1 class="text-4xl md:text-5xl font-black tracking-tighter text-gradient-primary">CleanSpot</h1>
<p class="text-on-surface-variant font-medium tracking-tight text-lg">Civic responsibility, redefined through clarity.</p>
</header>
<!-- Role Selection -->
<section class="flex flex-col gap-6">
<div class="flex flex-col gap-2 items-center">
<span class="text-xs font-bold tracking-[0.1em] text-primary uppercase">Identity selection</span>
<h2 class="text-2xl font-bold text-on-surface">Select your role to continue</h2>
</div>
<!-- Asymmetric Grid for Roles -->
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Citizen Card (Active by Default in this Mockup) -->
<button class="group flex flex-col gap-4 p-6 rounded-3xl bg-surface-container-highest border-2 border-primary ring-4 ring-primary/10 transition-all text-left">
<div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-primary/20 text-primary">
<span class="material-symbols-outlined">person</span>
</div>
<div>
<h3 class="font-bold text-on-surface">Citizen</h3>
<p class="text-xs text-on-surface-variant mt-1">Report issues &amp; track local progress.</p>
</div>
</button>
<!-- Volunteer Card -->
<button class="group flex flex-col gap-4 p-6 rounded-3xl bg-surface-container-low hover:bg-surface-container transition-all text-left">
<div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-secondary/10 text-secondary">
<span class="material-symbols-outlined">volunteer_activism</span>
</div>
<div>
<h3 class="font-bold text-on-surface">Volunteer</h3>
<p class="text-xs text-on-surface-variant mt-1">Join cleanups &amp; earn community rewards.</p>
</div>
</button>
<!-- Authority Card -->
<button class="group flex flex-col gap-4 p-6 rounded-3xl bg-surface-container-low hover:bg-surface-container transition-all text-left">
<div class="w-12 h-12 flex items-center justify-center rounded-2xl bg-tertiary-container/20 text-tertiary">
<span class="material-symbols-outlined">gavel</span>
</div>
<div>
<h3 class="font-bold text-on-surface">Authority</h3>
<p class="text-xs text-on-surface-variant mt-1">Manage reports &amp; dispatch city teams.</p>
</div>
</button>
</div>
</section>
<!-- Login Form -->
<div class="bg-surface-container-low p-8 rounded-[2rem] shadow-2xl relative overflow-hidden">
<!-- Subtle Form Background Texture -->
<div class="absolute inset-0 opacity-10 pointer-events-none" data-alt="subtle dark carbon fiber texture for a high-end technological feel" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBom0bupwnAg64p6jNYHYaHNCDTNBitiRovlWFzg6reRtCSr1l8FCHmT_vbW5g67dhUL02mA628pjca-FQMuHb9bUXbgrQdbyxPEHORC8KSgLQRmtOBvHpYadn5NkzZnd40mmynm6DnGXMhWUklqUuSqmMDzE7Chu0nx9mYg7pJBsaCcYeWw2IaslkmcLLPJIb8bBy6eT0SeE_Y0RrqBiCSdfH7abP-yjrjM5GuqNtrkXBuR71g2DI_1UGr9cGVzjdXgSeCb6aXtFvb');"></div>
<form class="flex flex-col gap-6 relative z-10">
<div class="flex flex-col gap-2">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant ml-1" for="email">Email Address</label>
<input class="h-14 w-full px-5 rounded-2xl bg-surface-container-lowest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" id="email" placeholder="name@example.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">Forgot?</a>
</div>
<input class="h-14 w-full px-5 rounded-2xl bg-surface-container-lowest border-none text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/40 transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="mt-2 h-14 w-full rounded-2xl bg-gradient-to-br from-primary to-primary-container text-on-primary-fixed font-bold text-lg flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all">
<span>Login to CleanSpot</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Links -->
<footer class="flex flex-col items-center gap-4 text-center">
<p class="text-on-surface-variant text-sm">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Create Citizen Profile</a>
</p>
<div class="flex gap-6 opacity-40">
<a class="text-xs font-medium text-on-surface hover:opacity-100 transition-opacity" href="#">Privacy Policy</a>
<a class="text-xs font-medium text-on-surface hover:opacity-100 transition-opacity" href="#">Terms of Service</a>
<a class="text-xs font-medium text-on-surface hover:opacity-100 transition-opacity" href="#">Contact Support</a>
</div>
</footer>
</main>
<!-- Contextual Decoration: Abstract Civic Data Grid -->
<div class="hidden lg:block fixed right-10 top-1/2 -translate-y-1/2 w-64 space-y-4 opacity-20 pointer-events-none">
<div class="h-32 w-full bg-surface-container rounded-3xl overflow-hidden border border-outline-variant/10">
<div class="w-full h-full p-4 flex flex-col justify-end">
<div class="flex gap-1 items-end h-full">
<div class="w-2 bg-primary h-1/2 rounded-full"></div>
<div class="w-2 bg-primary h-3/4 rounded-full"></div>
<div class="w-2 bg-primary h-2/3 rounded-full"></div>
<div class="w-2 bg-primary h-full rounded-full"></div>
<div class="w-2 bg-primary h-1/2 rounded-full"></div>
</div>
</div>
</div>
<div class="p-4 bg-surface-container rounded-3xl border border-outline-variant/10">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-secondary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary text-sm">verified</span>
</div>
<div class="space-y-1">
<div class="h-2 w-20 bg-outline-variant rounded-full"></div>
<div class="h-1.5 w-12 bg-outline-variant/50 rounded-full"></div>
</div>
</div>
</div>
</div>
</body></html>
